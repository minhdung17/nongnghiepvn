<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ANVIFA — Sổ hóa đơn & thuế</title>

<style>
:root{
  --green:#14532D; --green2:#1E7A3C; --gold:#E7A83E; --earth:#5C4327;
  --bg:#F3F1E9; --card:#FFFFFF; --ink:#22301F; --mut:#7d8272; --line:#E4E0D2;
  --red:#B3402E; --blue:#2E6DA4; --purple:#7A3B8F;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Roboto,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;padding-bottom:76px}
header{background:linear-gradient(135deg,var(--earth) 0%,#7a5c38 100%);color:#fff;padding:12px 14px;position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.hleft{min-width:0;flex:1}
header h1{font-size:15.5px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header h1 b{color:var(--gold)}
header .sub{font-size:11px;opacity:.75;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hright{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
#sync{font-size:10px;background:rgba(255,255,255,.15);padding:3px 9px;border-radius:20px;white-space:nowrap}
.hbtn{font-size:11.5px;background:rgba(255,255,255,.22);color:#fff;border:none;padding:5px 10px;border-radius:20px;cursor:pointer;font-weight:700;white-space:nowrap}
.wrap{padding:12px;max-width:960px;margin:0 auto}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.kpi{background:var(--card);border-radius:13px;padding:12px 13px;border:1px solid var(--line)}
.kpi .l{font-size:11.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
.kpi .v{font-size:19px;font-weight:800;color:var(--green);margin-top:3px;word-break:break-all}
.kpi.big{grid-column:1/-1;background:linear-gradient(135deg,var(--earth),#7a5c38);border:none}
.kpi.big .l{color:rgba(255,255,255,.75)}
.kpi.big .v{color:var(--gold);font-size:24px}
.kpi .d{font-size:11px;color:var(--mut);margin-top:2px}
.kpi.big .d{color:rgba(255,255,255,.7)}
.kpi.warn{background:#FFF3D6}
.kpi.warn .l,.kpi.warn .v{color:#8a6100}
.chips{display:flex;gap:6px;overflow-x:auto;margin:12px 0 10px;padding-bottom:2px}
.chip{flex:0 0 auto;padding:7px 13px;border-radius:20px;background:#fff;border:1px solid var(--line);font-size:12.5px;color:var(--ink);cursor:pointer;white-space:nowrap}
.chip.on{background:var(--earth);color:#fff;border-color:var(--earth);font-weight:600}
.sec{background:var(--card);border-radius:13px;border:1px solid var(--line);margin-top:12px;overflow:hidden}
.sec h3{font-size:12.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--earth);padding:11px 13px 0;display:flex;justify-content:space-between;align-items:center}
.sec h3 .act{font-size:11.5px;color:var(--blue);cursor:pointer;text-transform:none;letter-spacing:0}
table{width:100%;border-collapse:collapse;font-size:12.8px;margin-top:8px}
th{font-size:10.5px;text-transform:uppercase;color:var(--mut);text-align:left;padding:5px 8px;border-bottom:1px solid var(--line);letter-spacing:.04em}
td{padding:8px;border-bottom:1px solid #f0ede1;vertical-align:top}
tr:last-child td{border-bottom:none}
td.r,th.r{text-align:right}
.money{font-weight:700;color:var(--green);white-space:nowrap}
.neg{color:var(--red)}
.list-item{display:flex;justify-content:space-between;gap:8px;padding:11px 13px;border-bottom:1px solid #f0ede1;cursor:pointer;align-items:flex-start}
.list-item:last-child{border-bottom:none}
.list-item .t{font-weight:700;font-size:14px}
.list-item .s{font-size:12px;color:var(--mut);margin-top:2px;line-height:1.45}
.tag{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:12px;font-weight:700}
.tag.vao{background:#DCE9F7;color:#2E6DA4}.tag.ra{background:#DFF0DC;color:#2E7031}
.tag.chua{background:#FFF3D6;color:#8a6100}.tag.roi{background:#DFF0DC;color:#2E7031}
.tag.huy{background:#F7DCDC;color:#B3402E}.tag.tim{background:#F3E3F7;color:#7A3B8F}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;background:var(--earth);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.btn.gold{background:var(--gold);color:#3d2b00}
.btn.green{background:var(--green)}
.btn.line{background:#fff;color:var(--earth);border:1.5px solid var(--earth)}
.btn.sm{width:auto;display:inline-block;padding:8px 14px;font-size:12.5px;margin:8px 6px 10px 0}
.btn.danger{background:#fff;color:var(--red);border:1.5px solid var(--red)}
.fab{position:fixed;right:16px;bottom:88px;width:54px;height:54px;border-radius:50%;background:var(--gold);color:#3d2b00;font-size:30px;border:none;box-shadow:0 4px 14px rgba(60,40,0,.35);cursor:pointer;z-index:25;line-height:1}
nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;border:none;background:none;padding:9px 2px 7px;font-size:10px;color:var(--mut);cursor:pointer}
nav button .ic{font-size:19px;display:block;margin-bottom:1px}
nav button.on{color:var(--earth);font-weight:700}
.overlay{position:fixed;inset:0;background:rgba(30,25,15,.5);z-index:40;display:none}
.sheet{position:fixed;left:0;right:0;bottom:0;max-height:90vh;overflow-y:auto;background:#fff;border-radius:18px 18px 0 0;z-index:50;padding:18px 16px 30px;display:none}
.sheet h2{font-size:16px;color:var(--earth);margin-bottom:12px}
label{display:block;font-size:11.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin:11px 0 4px}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#FDFCF8;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid var(--green2)}
input.mini,select.mini{padding:7px 8px;font-size:13px;border-radius:8px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.row3{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:6px;align-items:end}
.row4{display:grid;grid-template-columns:2.2fr .9fr .8fr 1fr 1.1fr auto;gap:5px;align-items:end}
.xdel{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:8px 4px}
.hint{font-size:11.5px;color:var(--mut);margin-top:4px;line-height:1.5}
.tot{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0}
.tot b{color:var(--green)}
.tot.grand{border-top:2px solid var(--earth);margin-top:5px;padding-top:9px;font-size:16px;font-weight:800}
.pwrap{position:relative}
.pwrap input{padding-right:46px}
.pweye{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;cursor:pointer;padding:6px}
.empty{text-align:center;color:var(--mut);padding:34px 16px;font-size:13.5px;line-height:1.6}
.search{margin-bottom:10px}
.detail p{font-size:13.5px;line-height:1.8}
.detail b{color:var(--earth)}
.dropzone{border:2.5px dashed var(--earth);border-radius:14px;padding:26px 14px;text-align:center;color:var(--earth);background:#fbf9f2;cursor:pointer;margin-top:12px;font-size:14px;line-height:1.7}
.dropzone.drag{background:#f0ead8;border-color:var(--gold)}
.dkbox{background:#f8f6ee;border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-top:8px}
.dkbox .dkrow{display:grid;grid-template-columns:.7fr 2fr 1.3fr auto;gap:6px;margin-top:6px;align-items:center}
.dkbox .dkttl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em}
@media(min-width:620px){.cards{grid-template-columns:repeat(4,1fr)}.kpi.big{grid-column:1/-1}}
@media print{body{display:none}}
</style>
</head>
<body>
<header>
  <div class="hleft"><h1>ANVI<b>FA</b> · Sổ hóa đơn & thuế</h1><div class="sub" id="subttl">Sổ thống kê nội bộ — HĐĐT chính thức vẫn qua cơ quan thuế</div></div>

<script>
/* ================= TIEN ICH ================= */
const $ = id => document.getElementById(id);
const esc = s => String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => (Math.round(+n)||0).toLocaleString('vi-VN') + ' đ';
const fmt0 = n => (Math.round(+n)||0).toLocaleString('vi-VN');
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today = () => new Date().toISOString().slice(0,10);
const thisMonth = () => new Date().toISOString().slice(0,7);
const hp = s => { let h=5381; for(const c of s) h=((h*33)+c.charCodeAt(0))>>>0; return h.toString(36); };
const dmy = d => (d||'').slice(0,10).split('-').reverse().join('/');
function parseVN(s){ // '154.800.000' hoặc '2.000,5' -> number
  if(typeof s === 'number') return s;
  s = String(s||'').trim().replace(/[^\d.,-]/g,'');
  if(!s) return 0;
  if(s.includes(',')){ s = s.replace(/\./g,'').replace(',', '.'); }
  else { s = s.replace(/\.(?=\d{3}(\D|$))/g,''); }
  return parseFloat(s)||0;
}
function docSoVN(n){ // doc so thanh chu tieng Viet
  n = Math.round(Math.abs(+n||0));
  if(n===0) return 'Không đồng';
  const CS=['không','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'];
  function doc3(so, full){
    let tram=Math.floor(so/100), chuc=Math.floor((so%100)/10), dv=so%10, s='';
    if(full || tram>0){ s+=CS[tram]+' trăm'; if(chuc===0&&dv>0) s+=' linh'; }
    if(chuc>1){ s+=' '+CS[chuc]+' mươi'; if(dv===1) s+=' mốt'; }
    else if(chuc===1){ s+=' mười'; if(dv===1) s+=' một'; }
    if(chuc>0&&dv===5) s+=' lăm';
    else if(dv>1||(dv===1&&chuc===0)||(dv===5&&chuc===0)){ if(!(chuc>=1&&dv===1)) s+=' '+CS[dv]; }
    return s.trim();
  }
  const DV=['',' nghìn',' triệu',' tỷ',' nghìn tỷ',' triệu tỷ'];
  let parts=[], i=0;
  while(n>0){ parts.push(n%1000); n=Math.floor(n/1000); i++; }
  let s='';
  for(let j=parts.length-1;j>=0;j--){
    if(parts[j]>0) s+=(s?' ':'')+doc3(parts[j], s!=='' )+DV[j];
    else if(s && j===0){}
  }
  s = s.trim(); s = s.charAt(0).toUpperCase()+s.slice(1);
  return s+' đồng';
}
function tinhTNCN(tnTinhThue){ // bieu luy tien tung phan theo thang
  const B=[[5e6,.05],[10e6,.10],[18e6,.15],[32e6,.20],[52e6,.25],[80e6,.30],[Infinity,.35]];
  let t=0, prev=0;
  for(const [cap,rate] of B){ if(tnTinhThue>prev) t+=(Math.min(tnTinhThue,cap)-prev)*rate; prev=cap; if(tnTinhThue<=cap) break; }
  return Math.round(t);
}
/* ================= HE THONG TAI KHOAN (khung TT 99/2025/TT-BTC, hieu luc nam tai chinh 2026) ================= */
function defaultAccounts(){ return [
 ['111','Tiền mặt'],['112','Tiền gửi ngân hàng'],['121','Chứng khoán kinh doanh'],['128','Đầu tư nắm giữ đến ngày đáo hạn'],
 ['131','Phải thu của khách hàng'],['133','Thuế GTGT được khấu trừ'],['1331','Thuế GTGT được khấu trừ của HHDV'],['1332','Thuế GTGT được khấu trừ của TSCĐ'],
 ['138','Phải thu khác'],['141','Tạm ứng'],['151','Hàng mua đang đi đường'],['152','Nguyên liệu, vật liệu'],['153','Công cụ, dụng cụ'],
 ['154','Chi phí SXKD dở dang'],['155','Thành phẩm'],['156','Hàng hóa'],['157','Hàng gửi đi bán'],
 ['211','TSCĐ hữu hình'],['213','TSCĐ vô hình'],['214','Hao mòn TSCĐ'],['215','Tài sản sinh học'],['229','Dự phòng tổn thất tài sản'],
 ['241','Xây dựng cơ bản dở dang'],['242','Chi phí trả trước'],
 ['331','Phải trả cho người bán'],['333','Thuế và các khoản phải nộp Nhà nước'],['3331','Thuế GTGT phải nộp'],['3334','Thuế TNDN'],['3335','Thuế TNCN'],['3338','Các loại thuế khác'],
 ['334','Phải trả người lao động'],['335','Chi phí phải trả'],['338','Phải trả, phải nộp khác'],['3382','Kinh phí công đoàn'],['3383','Bảo hiểm xã hội'],['3384','Bảo hiểm y tế'],['3385','Bảo hiểm thất nghiệp'],
 ['341','Vay và nợ thuê tài chính'],['353','Quỹ khen thưởng, phúc lợi'],
 ['411','Vốn đầu tư của chủ sở hữu'],['421','Lợi nhuận sau thuế chưa phân phối'],
 ['511','Doanh thu bán hàng và cung cấp dịch vụ'],['515','Doanh thu hoạt động tài chính'],['521','Các khoản giảm trừ doanh thu'],
 ['632','Giá vốn hàng bán'],['635','Chi phí tài chính'],['641','Chi phí bán hàng'],['642','Chi phí quản lý doanh nghiệp'],
 ['711','Thu nhập khác'],['811','Chi phí khác'],['821','Chi phí thuế TNDN'],['911','Xác định kết quả kinh doanh']
].map(([code,name])=>({code,name})); }
const EXP_CATS = ['Thuê văn phòng / kho','Vận chuyển','Điện nước','Quảng cáo / Marketing','Phí sàn TMĐT','Văn phòng phẩm','Sửa chữa, bảo trì','Khác'];
/* ================= MO HINH DU LIEU ================= */
const RECORD_COLLECTIONS = ['invoices','vouchers','payrolls','expenses'];
let db = { company:{name:'CÔNG TY TNHH NÔNG NGHIỆP SẠCH ANVIFA VIỆT NAM', short:'ANVIFA AGRI VN CO.,LTD', mst:'', addr:'Tầng 5, Tòa nhà TTM Building, số 309 Bạch Đằng, Phường Gia Định, TP. Hồ Chí Minh', phone:'', bank:'', bankAcc:'', bankBranch:'', rep:'', repTitle:'Giám đốc', logo:''},
  settings:{vat:5, tndnMode:'auto', tndnRate:15, bhxhDN:21.5, bhxhNLD:10.5, gtBanThan:15500000, gtPhuThuoc:6200000},
  accounts:[], employees:[], products:[], pass:'',
  counters:{hd:1,pnk:1,pxk:1,pc:1,pt:1,unc:1},
  invoices:[], vouchers:[], payrolls:[], expenses:[] };
let me = false, tab = 'dash', dashRange = 'month';
window.__applyCatalog = function(patch){ Object.assign(db, patch); ensureSeed(); if(me) render(); };
window.__applyRecords = function(name, list){ db[name] = list; if(me) render(); };
function ensureSeed(){
  if(!db.accounts || !db.accounts.length) db.accounts = defaultAccounts();
  db.counters = db.counters || {hd:1,pnk:1,pxk:1,pc:1,pt:1,unc:1};
  db.company = db.company || {}; db.settings = Object.assign({vat:5,tndnMode:'auto',tndnRate:15,bhxhDN:21.5,bhxhNLD:10.5,gtBanThan:15500000,gtPhuThuoc:6200000}, db.settings||{});
  db.employees = db.employees||[]; db.products = db.products||[];
}
/* ================= LUU / TAI ================= */
async function saveCatalog(){
  $('sync').textContent = 'đang lưu…';
  try{ await dataApi.setCatalog({company:db.company, settings:db.settings, accounts:db.accounts, employees:db.employees, products:db.products, pass:db.pass, counters:db.counters}); $('sync').textContent = 'đã đồng bộ ✓'; }
  catch(e){ $('sync').textContent = 'lỗi lưu!'; console.error(e); }
}
async function saveRec(coll, rec){
  $('sync').textContent = 'đang lưu…';
  try{ await dataApi.setRecord(coll, rec); $('sync').textContent = 'đã đồng bộ ✓'; }
  catch(e){ $('sync').textContent = 'lỗi lưu!'; console.error(e); }
}
async function delRec(coll, id){
  $('sync').textContent = 'đang lưu…';
  try{ await dataApi.delRecord(coll, id); $('sync').textContent = 'đã đồng bộ ✓'; }
  catch(e){ $('sync').textContent = 'lỗi lưu!'; console.error(e); }
}
async function loadDB(){
  let isNew = false;
  const catalogFirst = new Promise(resolve=>{ let first = true;
    dataApi.subscribeCatalog(patch=>{ if(first){ first=false; if(!patch){ isNew=true; } resolve(); } window.__applyCatalog(patch||{}); }); });
  const recordFirsts = RECORD_COLLECTIONS.map(name=>new Promise(resolve=>{ let first = true;
    dataApi.subscribeCollection(name, list=>{ if(first){ first=false; resolve(); } window.__applyRecords(name, list); }); }));
  try{ await Promise.all([catalogFirst, ...recordFirsts]); }catch(e){ console.error(e); }
  ensureSeed();
  if(isNew){ try{ await saveCatalog(); }catch(e){} }
  me = sessionStorage.getItem('ktoan_auth')==='1' && !!db.pass;
  $('sync').textContent = 'đã đồng bộ ✓';
  boot();
}
/* ================= DANG NHAP ================= */
function setChrome(){
  $('nav').style.display = me? 'flex':'none';
  $('fab').style.display = me? 'block':'none';
  $('helpbtn').style.display = me? 'block':'none';
  $('lockbtn').textContent = '⎋ Khóa sổ'; $('lockbtn').style.display = me? 'block':'none';
}
function boot(){ window.__appBooted = true; setChrome(); if(!me) renderLogin(); else render(); }
function renderLogin(){
  if(!db.pass){
    $('view').innerHTML = '<div class="sec" style="margin-top:30px;padding:22px 16px">'
    +'<h2 style="color:var(--earth);font-size:17px">🏁 Thiết lập lần đầu — đặt mật khẩu sổ sách</h2>'
    +'<div class="hint">Sổ hóa đơn & thuế là dữ liệu nhạy cảm. Đặt một mật khẩu (chỉ chủ doanh nghiệp/kế toán biết).</div>'
    +'<label>Mật khẩu *</label><div class="pwrap"><input id="su_pass" type="password"><button type="button" class="pweye" onclick="togglePw(&quot;su_pass&quot;,this)">👁</button></div>'
    +'<label>Nhập lại mật khẩu *</label><div class="pwrap"><input id="su_pass2" type="password"><button type="button" class="pweye" onclick="togglePw(&quot;su_pass2&quot;,this)">👁</button></div>'
    +'<button class="btn" onclick="doSetup()">Tạo sổ</button></div>';
    return;
  }
  $('view').innerHTML = '<div class="sec" style="margin-top:30px;padding:22px 16px">'
  +'<h2 style="color:var(--earth);font-size:17px;text-align:center">📒 Mở sổ hóa đơn & thuế</h2>'
  +'<label>Mật khẩu</label><div class="pwrap"><input id="lg_pass" type="password" onkeydown="if(event.key===\'Enter\')doLogin()"><button type="button" class="pweye" onclick="togglePw(&quot;lg_pass&quot;,this)">👁</button></div>'
  +'<button class="btn" onclick="doLogin()">Mở sổ</button></div>';
}
async function doSetup(){
  const p=$('su_pass').value; if(p.length<4){ alert('Mật khẩu tối thiểu 4 ký tự'); return; }
  if(p!==$('su_pass2').value){ alert('Mật khẩu nhập lại không khớp'); return; }
  db.pass = hp(p); await saveCatalog(); sessionStorage.setItem('ktoan_auth','1'); me=true; boot();

function inRange(dstr, range){
  const d=(dstr||'').slice(0,10), now=new Date(), y=now.getFullYear(), m=String(now.getMonth()+1).padStart(2,'0');
  if(range==='day') return d===today();
  if(range==='month') return d.startsWith(y+'-'+m);
  if(range==='quarter'){ const q=Math.floor(now.getMonth()/3); const ms=[q*3+1,q*3+2,q*3+3].map(x=>String(x).padStart(2,'0')); return ms.some(mm=>d.startsWith(y+'-'+mm)); }
  if(range==='year') return d.startsWith(y+'-');
  return true;
}
function allJournal(){ // gom toan bo dinh khoan tu moi chung tu
  const out=[];
  db.invoices.forEach(iv=>{ (iv.dk||[]).forEach(l=>out.push({date:iv.date, ref:(iv.type==='in'?'HĐ vào ':'HĐ ra ')+(iv.no||''), desc:iv.type==='in'?('Mua của '+(iv.party?.name||'')):('Bán cho '+(iv.party?.name||'')), ...l})); });
  db.vouchers.forEach(v=>{ (v.dk||[]).forEach(l=>out.push({date:v.date, ref:v.no, desc:v.note||v.kind, ...l})); });
  db.payrolls.forEach(pr=>{ (pr.dk||[]).forEach(l=>out.push({date:pr.month+'-28', ref:'BL '+pr.month, desc:'Bảng lương tháng '+pr.month.slice(5), ...l})); });
  db.expenses.forEach(e=>{ (e.dk||[]).forEach(l=>out.push({date:e.date, ref:'CP', desc:e.cat+(e.note?' — '+e.note:''), ...l})); });
  return out.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
}

  const dtRa = invOut.reduce((s,i)=>s+(+i.pretax||0),0);

  h += '<div class="kpi'+(tndn>0?' warn':'')+'"><div class="l">TNDN ước tính ('+rate+'%)</div><div class="v">'+fmt(tndn)+'</div><div class="d">Tạm tính trên lợi nhuận kỳ này</div></div>';
  h += '<div class="kpi"><div class="l">Công nợ phải trả NCC</div><div class="v">'+fmt(noTra)+'</div></div>';
  h += '<div class="kpi"><div class="l">Công nợ phải thu KH</div><div class="v">'+fmt(noThu)+'</div></div>';
  h += '</div>';

function tndnRate(dtKy){
  if(db.settings.tndnMode!=='auto') return +db.settings.tndnRate||20;
  const y = new Date().getFullYear()+'-';
  const dtNam = db.invoices.filter(i=>i.type==='out' && (i.date||'').startsWith(y)).reduce((s,i)=>s+(+i.pretax||0),0);
  if(dtNam<=3e9) return 15; if(dtNam<=50e9) return 17; return 20;
}
function wireDropzone(){

function openImport(){ go('inv'); setTimeout(()=>{ const dz=$('dz'); if(dz) dz.scrollIntoView({behavior:'smooth'}); },50); }
async function handleFiles(files){
  for(const f of files){
    try{
      let draft = null;
      if(/\.xml$/i.test(f.name)) draft = parseXMLInvoice(await f.text());
      else if(/\.pdf$/i.test(f.name)) draft = await parsePDFInvoice(f);
      else { alert('Chỉ nhận file .pdf hoặc .xml'); continue; }
      draft.srcFile = f.name;
      if(draft.no && db.invoices.some(x=>x.no===draft.no && x.serial===draft.serial)){
        if(!confirm('Hóa đơn số '+draft.no+' ký hiệu '+draft.serial+' ĐÃ có trong sổ. Vẫn mở form (có thể bị trùng)?')) continue;
      }
      openInvoiceForm(draft);
      break; // mo form tung file mot
    }catch(e){ console.error(e); alert('Không đọc được file "'+f.name+'": '+e.message+'\nBạn có thể nhập tay bằng nút ✍️ Nhập hóa đơn.'); }
  }
}
function parseXMLInvoice(txt){
  const doc = new DOMParser().parseFromString(txt, 'text/xml');
  const gv = tag => { const el = doc.getElementsByTagName(tag)[0]; return el? el.textContent.trim() : ''; };
  const sellerEl = doc.getElementsByTagName('NBan')[0], buyerEl = doc.getElementsByTagName('NMua')[0];
  const sub = (el,tag)=>{ if(!el) return ''; const x=el.getElementsByTagName(tag)[0]; return x? x.textContent.trim():''; };
  const items = [];
  const list = doc.getElementsByTagName('HHDVu');
  for(const it of list){ items.push({ name:sub(it,'THHDVu'), unit:sub(it,'DVTinh'), qty:parseVN(sub(it,'SLuong')), price:parseVN(sub(it,'DGia')), amt:parseVN(sub(it,'ThTien')) }); }
  const nlap = gv('NLap');
  const myMst = (db.company.mst||'').trim();
  const sellerMst = sub(sellerEl,'MST'), buyerMst = sub(buyerEl,'MST');
  let type = 'in';
  if(myMst && sellerMst===myMst) type='out'; else if(myMst && buyerMst===myMst) type='in';
  return { type, serial:gv('KHHDon'), no:String(+gv('SHDon')||gv('SHDon')), date:nlap||today(), mccqt:gv('MCCQT')||'',
    seller:{name:sub(sellerEl,'Ten'), mst:sellerMst, addr:sub(sellerEl,'DChi')},
    buyer:{name:sub(buyerEl,'Ten'), mst:buyerMst, addr:sub(buyerEl,'DChi')},
    items, pretax:parseVN(gv('TgTCThue')), vat:parseVN(gv('TgTThue')), total:parseVN(gv('TgTTTBSo')), vatRate: parseVN(gv('TSuat'))||db.settings.vat, src:'xml' };
}
async function parsePDFInvoice(file){
  if(!window.pdfjsLib) throw new Error('Thư viện đọc PDF chưa tải xong (cần Internet). Thử lại sau vài giây.');
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  let lines = [];
  for(let p=1;p<=Math.min(pdf.numPages,3);p++){
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    const rows = {};
    tc.items.forEach(it=>{ const y = Math.round(it.transform[5]/3)*3; (rows[y]=rows[y]||[]).push({x:it.transform[4], str:it.str, w:it.width}); });
    const ys = Object.keys(rows).map(Number).sort((a,b)=>b-a);
    ys.forEach(y=>{ const toks = rows[y].sort((a,b)=>a.x-b.x); let s='', lastEnd=null;
      toks.forEach(t=>{ if(lastEnd!==null){ s += (t.x-lastEnd>7)? '  ' : ' '; } s+=t.str; lastEnd=t.x+(t.w||0); });
      lines.push(s.replace(/\s+$/,'')); });
  }
  return parseInvoiceLines(lines);
}
function parseInvoiceLines(lines){
  const all = lines.join('\n');
  if(!all.trim()) throw new Error('File PDF không có lớp chữ (có thể là bản scan/ảnh) — hãy nhập tay.');
  const m = (re)=>{ const r = all.match(re); return r? r[1].trim() : ''; };
  const serial = m(/Ký hiệu[:\s]*([0-9A-Z]{4,})/i);
  let no = m(/(?:^|\s)Số[:\s]*0*([0-9]{1,8})\b/im);
  const dd = all.match(/Ngày\s*(\d{1,2})\s*tháng\s*(\d{1,2})\s*năm\s*(\d{4})/i);
  const date = dd? dd[3]+'-'+dd[2].padStart(2,'0')+'-'+dd[1].padStart(2,'0') : today();
  const mccqt = m(/Mã của cơ quan thuế[:\s]*([0-9A-F]{10,})/i);
  // ben ban / ben mua theo trinh tu dong
  let seller={name:'',mst:'',addr:''}, buyer={name:'',mst:'',addr:''}, sect='';
  lines.forEach(L=>{
    if(/bán hàng[:\s]*$/i.test(L)||/đơn vị bán hàng/i.test(L)) sect='s';
    if(/mua hàng/i.test(L)) sect='b';
    const tgt = sect==='b'? buyer : seller;
    let mm;
    if(sect && (mm=L.match(/(?:Tên đơn vị|Họ tên người)[^:]*:\s*(.+)$/i)) && !/Hình thức/i.test(L)){ if(!tgt.name) tgt.name = mm[1].replace(/\s{2,}.*$/,'').trim(); }
    if((mm=L.match(/Mã số thuế[^:]*:\s*([0-9][0-9\s-]{8,})/i))){ if(!tgt.mst) tgt.mst = mm[1].replace(/[^0-9-]/g,''); }
    if((mm=L.match(/Địa chỉ[^:]*:\s*(.+)$/i))){ if(!tgt.addr) tgt.addr = mm[1].replace(/\s{2,}Hình thức.*$/i,'').trim(); }
  });
  // bang hang hoa: dong bat dau bang STT va co >=3 so o cuoi
  const items = [];
  lines.forEach(L=>{
    if(/Tên hàng|Đơn vị tính|Cộng tiền|Thuế suất|Số tiền viết/i.test(L)) return;
    const r = L.match(/^\s*(\d{1,3})\s+(.+?)\s{2,}(\S.*?)\s{2,}([\d.,]+)\s{2,}([\d.,]+)\s{2,}([\d.,]+)\s*$/);
    if(r && +r[1]<100){
      const qty=parseVN(r[4]), price=parseVN(r[5]), amt=parseVN(r[6]);
      if(amt>0 && Math.abs(qty*price-amt) < Math.max(2, amt*0.02)) items.push({name:r[2].trim(), unit:r[3].trim(), qty, price, amt});
      else if(amt>0 && qty>0) items.push({name:r[2].trim(), unit:r[3].trim(), qty, price, amt});
    }
  });
  const pretax = parseVN(m(/Cộng tiền hàng[:\s]*([\d.,]+)/i));
  const vatRate = parseVN(m(/Thuế suất(?:\s*GTGT)?[:\s]*([\d.,]+)\s*%/i)) || db.settings.vat;
  const vat = parseVN(m(/Tiền thuế(?:\s*GTGT)?[:\s]*([\d.,]+)/i));
  const total = parseVN(m(/Tổng cộng tiền thanh toán[:\s]*([\d.,]+)/i));
  const myMst = (db.company.mst||'').trim();
  let type='in';
  if(myMst && seller.mst===myMst) type='out'; else type='in';
  return { type, serial, no, date, mccqt, seller, buyer, items, pretax, vat, total, vatRate, src:'pdf' };
}

function recalcInv(){ ivd.pretax=0; ivd.vat=0; ivd.total=0; ivd.dk=null; drawInvoiceForm(); }
function suggestInvDK(iv){
  const pretax = +iv.pretax||0, vat = +iv.vat||0, total = pretax+vat;
  if(iv.type==='in'){
    const co = iv.payNow==='tm'? '111' : iv.payNow==='ck'? '112' : '331';
    return [{side:'N',tk:'156',amt:pretax},{side:'N',tk:'1331',amt:vat},{side:'C',tk:co,amt:total}];
  } else {
    const no = iv.payNow==='tm'? '111' : iv.payNow==='ck'? '112' : '131';
    const dk = [{side:'N',tk:no,amt:total},{side:'C',tk:'511',amt:pretax},{side:'C',tk:'3331',amt:vat}];
    const cogs = estCOGS(iv); if(cogs>0){ dk.push({side:'N',tk:'632',amt:cogs}); dk.push({side:'C',tk:'156',amt:cogs}); }
    return dk;
  }
}
function estCOGS(iv){
  let c=0; (iv.items||[]).forEach(it=>{ const p=db.products.find(x=>x.name.toLowerCase()===String(it.name||'').toLowerCase()); if(p&&p.cost) c+=p.cost*(+it.qty||0); });
  return Math.round(c);
}
function nextNo(key, prefix){ const n = db.counters[key]||1; db.counters[key]=n+1; return prefix+'-'+String(n).padStart(4,'0'); }
async function saveInvoice(){
  if(!ivd.no && !confirm('Chưa có SỐ hóa đơn. Vẫn lưu?')) return;
  const iv = { id:ivd.id||uid(), type:ivd.type, serial:ivd.serial, no:ivd.no, date:ivd.date, mccqt:ivd.mccqt||'',
    party: JSON.parse(JSON.stringify(ivParty())),
    items: ivd.items.filter(it=>it.name).map(it=>({name:it.name,unit:it.unit,qty:+it.qty||0,price:+it.price||0,amt:Math.round(it.amt||(+it.qty||0)*(+it.price||0))})),
    pretax:+ivd.pretax||0, vatRate:+ivd.vatRate||0, vat:+ivd.vat||0, total:+ivd.total||0,
    note:ivd.note||'', srcFile:ivd.srcFile||'', payStatus:'chua', vouchers:[], dk:(ivd.dk||[]).filter(l=>l.amt>0) };
  // 1) Phieu kho + cap nhat ton
  if(iv.type==='in'){
    const no = nextNo('pnk','PNK');
    iv.vouchers.push(mkVoucher({kind:'PNK', no, date:iv.date, invoiceId:iv.id, party:iv.party, amount:iv.pretax, note:'Nhập kho theo HĐ '+iv.no, items:iv.items}));
    iv.items.forEach(it=>{
      let p = db.products.find(x=>x.name.toLowerCase()===it.name.toLowerCase());
      if(!p){ p={id:uid(), name:it.name, unit:it.unit, qty:0, cost:0}; db.products.push(p); }
      const old=Math.max(0,p.qty||0), oc=p.cost||0, np=it.qty? it.price:0;
      if(np>0) p.cost = (old>0&&oc>0)? Math.round((old*oc+it.qty*np)/(old+it.qty)) : np;
      p.qty = (p.qty||0)+(+it.qty||0); if(it.unit) p.unit=it.unit;
    });
  } else {
    const no = nextNo('pxk','PXK');
    iv.vouchers.push(mkVoucher({kind:'PXK', no, date:iv.date, invoiceId:iv.id, party:iv.party, amount:iv.pretax, note:'Xuất kho theo HĐ '+iv.no, items:iv.items}));
    iv.items.forEach(it=>{ const p=db.products.find(x=>x.name.toLowerCase()===it.name.toLowerCase()); if(p) p.qty=(p.qty||0)-(+it.qty||0); });
  }
  // 2) Phieu tien neu thanh toan ngay
  if(ivd.payNow==='tm'||ivd.payNow==='ck'){
    iv.payStatus='roi'; iv.payMethod=ivd.payNow; iv.paidAt=iv.date;
    addPayVoucher(iv, ivd.payNow, true);
  }
  db.invoices = db.invoices.filter(x=>x.id!==iv.id); db.invoices.push(iv);
  await saveRec('invoices', iv);
  for(const v of iv.vouchers){ await saveRec('vouchers', v); }
  await saveCatalog();
  closeSheet(); go('inv');
}
function mkVoucher(v){ v.id=uid(); db.vouchers.push(v); return v; }
function addPayVoucher(iv, method, atSave){
  // dinh khoan phieu tien: mua->tra tien (N331/C111|112), ban->thu tien (N111|112/C131)
  // Neu thanh toan NGAY khi luu, dinh khoan hoa don da ghi thang vao 111/112 -> phieu tien khong ghi dinh khoan (tranh trung)
  const isIn = iv.type==='in';
  let kind, no;
  if(isIn){ if(method==='tm'){ kind='PC'; no=nextNo('pc','PC'); } else { kind='UNC'; no=nextNo('unc','UNC'); } }
  else { if(method==='tm'){ kind='PT'; no=nextNo('pt','PT'); } else { kind='BC'; no=nextNo('pt','BC'); } }
  const dk = atSave? [] : (isIn? [{side:'N',tk:'331',amt:iv.total},{side:'C',tk:method==='tm'?'111':'112',amt:iv.total}]
                                : [{side:'N',tk:method==='tm'?'111':'112',amt:iv.total},{side:'C',tk:'131',amt:iv.total}]);
  const v = mkVoucher({kind, no, date:today(), invoiceId:iv.id, party:iv.party, amount:iv.total,
    note:(isIn?'Thanh toán':'Thu tiền')+' HĐ '+iv.no+' — '+(iv.party?.name||''), dk});
  iv.vouchers = iv.vouchers||[]; iv.vouchers.push(v);
  return v;
}
async function payInvoice(id, method){
  const iv = db.invoices.find(x=>x.id===id); if(!iv||iv.payStatus==='roi') return;
  iv.payStatus='roi'; iv.payMethod=method; iv.paidAt=today();
  const v = addPayVoucher(iv, method, false);
  await saveRec('invoices', iv); await saveRec('vouchers', v); await saveCatalog();
  closeSheet(); render();
  viewInvoice(id);
}
async function delInvoice(id){
  if(!confirm('Xóa hóa đơn này? Các phiếu kèm theo và tồn kho sẽ được hoàn lại.')) return;
  const iv = db.invoices.find(x=>x.id===id); if(!iv) return;
  iv.items.forEach(it=>{ const p=db.products.find(x=>x.name.toLowerCase()===it.name.toLowerCase()); if(p) p.qty=(p.qty||0)+(iv.type==='in'? -(+it.qty||0) : (+it.qty||0)); });
  for(const v of (iv.vouchers||[])){ db.vouchers = db.vouchers.filter(x=>x.id!==v.id); await delRec('vouchers', v.id); }
  db.invoices = db.invoices.filter(x=>x.id!==id); await delRec('invoices', id); await saveCatalog();
  closeSheet(); render();
}

let prd = null;
function calcRow(r){
  const s = db.settings;
  r.tongThucTe = (+r.luongCB||0)+(+r.phuCap||0)+(+r.thuong||0);
  r.tnChiuThue = r.tongThucTe-(+r.phuCap||0);
  r.ktBH = Math.round((+r.luongBH||0)*(+s.bhxhNLD||10.5)/100);
  r.giamTru = (+s.gtBanThan||0)+(+s.gtPhuThuoc||0)*(+r.nguoiPT||0);
  r.tongGiamTru = r.ktBH + r.giamTru;
  r.tnTinhThue = Math.max(0, r.tnChiuThue - r.ktBH - r.giamTru);
  r.tncn = tinhTNCN(r.tnTinhThue);
  r.thucLinh = r.tongThucTe - r.ktBH - r.tncn - (+r.tamUng||0);
  r.cpDN = Math.round((+r.luongBH||0)*(+s.bhxhDN||21.5)/100);
  return r;
}

  const vatRa=invOut.reduce((s,i)=>s+i.vat,0), vatVao=invIn.reduce((s,i)=>s+i.vat,0);
  const J = allJournal().filter(l=>inRange(l.date,v));
  const rev = J.filter(l=>l.side==='C'&&['511','515','711'].some(c=>l.tk.startsWith(c))).reduce((s,l)=>s+l.amt,0);
  const cp = J.filter(l=>l.side==='N'&&['632','641','642','635','811'].some(c=>l.tk.startsWith(c))).reduce((s,l)=>s+l.amt,0);
  const cpKhongTru = db.expenses.filter(e=>!e.deduct && inRange(e.date,v)).reduce((s,e)=>s+e.amount,0);
  const ln = rev-cp, lnTinhThue = rev-(cp-cpKhongTru);
  const rate = tndnRate(); const tndn = Math.max(0, Math.round(lnTinhThue*rate/100));
  let h = '<div class="chips">'+ranges.map(([k,l])=>'<div class="chip '+(v===k?'on':'')+'" onclick="window._txRange=\''+k+'\';renderThue()">'+l+'</div>').join('')+'</div>';

  h += '<div class="sec"><h3>🏛️ Thuế TNDN ước tính</h3><div style="padding:4px 13px 12px">'
  +'<div class="tot"><span>Doanh thu & thu nhập (TK 511+515+711)</span><b>'+fmt(rev)+'</b></div>'
  +'<div class="tot"><span>Chi phí (632+641+642+635+811)</span><b>− '+fmt(cp)+'</b></div>'
  +(cpKhongTru>0?'<div class="tot"><span>Cộng lại chi phí KHÔNG được trừ</span><b>+ '+fmt(cpKhongTru)+'</b></div>':'')
  +'<div class="tot"><span>Lợi nhuận kế toán / thu nhập tính thuế</span><b>'+fmt(ln)+' / '+fmt(lnTinhThue)+'</b></div>'
  +'<div class="tot grand"><span>TNDN tạm tính ('+rate+'%'+(db.settings.tndnMode==='auto'?' — tự chọn theo doanh thu, Luật 67/2025':'')+')</span><b>'+fmt(tndn)+'</b></div>'
  +'<div class="hint">DT năm ≤ 3 tỷ → 15% · 3–50 tỷ → 17% · trên 50 tỷ → 20%. Số liệu là ƯỚC TÍNH để chủ động dòng tiền — tờ khai chính thức đối chiếu với kế toán.</div></div></div>';
  h += '<div class="sec"><h3>📅 Lịch thuế cần nhớ</h3><div style="padding:4px 13px 12px" class="detail"><p>'
  +'• <b>Khai VAT + TNCN theo quý:</b> hạn cuối là ngày cuối tháng đầu quý sau (Q1→30/4? không, 30/4-1/5 lễ thì lùi; chuẩn: ngày cuối cùng của tháng đầu quý tiếp theo).<br>'
  +'• <b>Tạm nộp TNDN quý:</b> hạn ngày 30 tháng đầu quý sau.<br>'

function handleLogo(inp){
  const f = inp.files[0]; inp.value=''; if(!f) return;
  const r = new FileReader();
  r.onload = () => { const img = new Image();
    img.onload = async () => { const cv=document.createElement('canvas'); const sc=Math.min(1, 300/img.width);
      cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      db.company.logo = cv.toDataURL('image/png'); await saveCatalog(); render(); };
    img.src = r.result; };
  r.readAsDataURL(f);
}

function dl(name, content, type){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(["﻿"+content],{type})); a.download=name; a.click(); }
function csvOf(rows){ return rows.map(r=>r.map(x=>'"'+String(x??'').replace(/"/g,'""')+'"').join(',')).join('\n'); }
function exportBangKe(type){
  const list = db.invoices.filter(i=>i.type===type).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const rows=[['STT','Ký hiệu','Số HĐ','Ngày','Tên '+(type==='in'?'người bán':'người mua'),'MST','Giá trị chưa thuế','Thuế suất %','Tiền thuế','Tổng thanh toán','Đã thanh toán','Ghi chú']];
  list.forEach((i,idx)=>rows.push([idx+1,i.serial,i.no,i.date,i.party?.name||'',i.party?.mst||'',i.pretax,i.vatRate,i.vat,i.total,i.payStatus==='roi'?'x':'',i.note||'']));
  dl('ANVIFA-bangke-'+(type==='in'?'muavao':'banra')+'.csv', csvOf(rows), 'text/csv');
}
function exportNKC(){
  const rows=[['Ngày','Chứng từ','Diễn giải','TK Nợ','TK Có','Số tiền']];
  allJournal().slice().reverse().forEach(l=>rows.push([l.date,l.ref,l.desc,l.side==='N'?l.tk:'',l.side==='C'?l.tk:'',l.amt]));

}
function backup(){ dl('ANVIFA-soketoan-'+today()+'.json', JSON.stringify({company:db.company,settings:db.settings,accounts:db.accounts,employees:db.employees,products:db.products,pass:db.pass,counters:db.counters,invoices:db.invoices,vouchers:db.vouchers,payrolls:db.payrolls,expenses:db.expenses}), 'application/json'); }
function restore(inp){
  const f=inp.files[0]; inp.value=''; if(!f) return;
  const r=new FileReader();
  r.onload = async () => { try{ const d=JSON.parse(r.result);
    if(!d.accounts||!d.invoices) throw 0;
    if(!confirm('Khôi phục sẽ THAY THẾ toàn bộ sổ hiện tại. Tiếp tục?')) return;
    Object.assign(db, {company:d.company||{},settings:d.settings||{},accounts:d.accounts||[],employees:d.employees||[],products:d.products||[],pass:d.pass||db.pass,counters:d.counters||{}});
    await saveCatalog();
    for(const name of RECORD_COLLECTIONS){ db[name]=d[name]||[]; for(const rec of db[name]){ await saveRec(name, rec); } }
    alert('Khôi phục xong'); render();
  }catch(e){ alert('File không hợp lệ'); console.error(e); } };
  r.readAsText(f);
}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

// Dung chung PROJECT Firebase voi app ban hang NHUNG khac vung du lieu hoan toan (tien to ktoan_)
const firebaseConfig = {
  apiKey: "AIzaSyDHDlqO_QrwOSiBf2SUIIQGC_7w0zQbg3g",
  authDomain: "anvifa-app.firebaseapp.com",
  projectId: "anvifa-app",
  storageBucket: "anvifa-app.firebasestorage.app",
  messagingSenderId: "903165167895",
  appId: "1:903165167895:web:7387f2bf78eb95a23c8f52"
};

const useFirebase = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith("PASTE");

if(useFirebase){
  const app = initializeApp(firebaseConfig);
  const fdb = getFirestore(app);
  const auth = getAuth(app);
  const catalogRef = doc(fdb, "ktoan_meta", "catalog");
  const authReady = new Promise((resolve)=>{
    const unsub = onAuthStateChanged(auth, (u)=>{ if(u){ unsub(); resolve(); } });
    signInAnonymously(auth).catch(err=>{ console.error("Firebase auth loi:", err); document.getElementById('sync').textContent='lỗi kết nối!'; });
  });
  let lastCatalogPush = null;
  window.dataApi = {
    async setCatalog(obj){ await authReady; lastCatalogPush = JSON.stringify(obj); await setDoc(catalogRef, obj); },
    async setRecord(name, rec){ await authReady; await setDoc(doc(fdb, 'ktoan_'+name, rec.id), rec); },
    async delRecord(name, id){ await authReady; await deleteDoc(doc(fdb, 'ktoan_'+name, id)); },
    subscribeCatalog(cb){ authReady.then(()=>{ onSnapshot(catalogRef, snap=>{ if(!snap.exists()){ cb(null); return; } const raw=JSON.stringify(snap.data()); if(raw!==lastCatalogPush) cb(snap.data()); }); }); },
    subscribeCollection(name, cb){ authReady.then(()=>{ onSnapshot(collection(fdb, 'ktoan_'+name), snap=>{ cb(snap.docs.map(d=>d.data())); }); }); }
  };
  authReady.then(()=>{ window.startApp(); });
} else {
  const lsKey = n => 'ktoan_local_'+n;
  window.dataApi = {
    async setCatalog(obj){ localStorage.setItem(lsKey('catalog'), JSON.stringify(obj)); },
    async setRecord(name, rec){ const v=localStorage.getItem(lsKey(name)); const list=v?JSON.parse(v):[]; const i=list.findIndex(x=>x.id===rec.id); if(i>=0) list[i]=rec; else list.push(rec); localStorage.setItem(lsKey(name), JSON.stringify(list)); },
    async delRecord(name, id){ const v=localStorage.getItem(lsKey(name)); const list=v?JSON.parse(v):[]; localStorage.setItem(lsKey(name), JSON.stringify(list.filter(x=>x.id!==id))); },
    subscribeCatalog(cb){ const v=localStorage.getItem(lsKey('catalog')); cb(v? JSON.parse(v) : null); },
    subscribeCollection(name, cb){ const v=localStorage.getItem(lsKey(name)); cb(v? JSON.parse(v) : []); }
  };
  console.warn('KTOAN: chua cau hinh Firebase — du lieu chi luu tren may nay.');
  window.startApp();
}
</script>
